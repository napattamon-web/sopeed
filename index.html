<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตารางภารกิจผู้บังคับบัญชา บก.อก.ฝ.</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* เรียกใช้ฟอนต์ TH Sarabun IT9 */
    @font-face {
      font-family: "THSarabunIT9";
      src: local("TH Sarabun IT9"), local("TH Sarabun New"), local("Sarabun");
      font-weight: normal; font-style: normal;
    }

    :root {
      --page-w: 1651px;
      --page-h: 991px;
      --border-color: #000000;
      --font-main: "THSarabunIT9", sans-serif;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
      margin: 0; padding: 20px;
      background: #333;
      font-family: var(--font-main);
    }

    .controls { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; }
    
    button {
      padding: 10px 25px; font-size: 20px; cursor: pointer;
      border: none; border-radius: 5px; font-family: var(--font-main);
      transition: 0.3s;
    }

    .btn-download { background: #28a745; color: white; }
    .btn-refresh { background: #17a2b8; color: white; }
    button:hover { opacity: 0.8; }

    /* พื้นที่กระดาษ (HD) */
    #capture-area {
      width: var(--page-w);
      height: var(--page-h);
      background: #fff;
      margin: 0 auto;
      position: relative;
      display: flex;
      flex-direction: column;
      border: 1px solid #000;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* ส่วนหัว - สีชมพู */
    .header-banner {
      width: 100%; text-align: center; padding: 20px 0;
      background-color: #ebadd6; 
      border-bottom: 2px solid var(--border-color);
    }
    .header-banner h2 { margin: 0; font-size: 44px; font-weight: bold; line-height: 1; }
    .header-banner p { margin: 8px 0 0; font-size: 36px; font-weight: bold; line-height: 1; }

    /* ตาราง */
    .content-area { flex-grow: 1; overflow: hidden; }
    table.mission-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    
    table.mission-table th, 
    table.mission-table td {
      border: 1.5px solid var(--border-color);
      padding: 10px 15px; font-size: 30px; line-height: 1.0;
      vertical-align: top; word-wrap: break-word; color: #000;
    }

    /* หัวตาราง - สีฟ้า */
    table.mission-table th {
      background-color: #a6caf0;
      font-weight: bold; text-align: center;
      height: 65px; vertical-align: middle;
    }

    .col-name { width: 23%; }
    .col-time { width: 17%; text-align: center; }
    .col-task { width: 40%; }
    .col-place { width: 20%; }

    .name-cell { font-weight: bold; }
    .red-task { color: #d00000; font-weight: bold; }

    /* ส่วนท้าย */
    .footer-area {
      position: absolute; bottom: 30px; width: 100%;
      padding: 0 60px; display: flex;
      justify-content: space-between; align-items: flex-end;
    }
    .signature-block { text-align: center; font-size: 30px; line-height: 1.2; }
    .footer-note { color: #d00000; font-weight: bold; font-size: 28px; }

    /* ปรับแต่งการแสดงผลบน Browser (Scaling) */
    @media (max-width: 1700px) {
      #capture-area { transform: scale(0.5); transform-origin: top center; margin-bottom: -500px; }
    }
  </style>
</head>
<body>

<div class="controls">
  <button class="btn-refresh" onclick="fetchData()">🔄 อัปเดตข้อมูลจาก Sheet</button>
  <button class="btn-download" onclick="downloadImage()">💾 บันทึกเป็นรูปภาพ (HD)</button>
</div>

<div id="capture-area">
  <div class="header-banner">
    <h2 id="dept-name">ตารางภารกิจผู้บังคับบัญชา กองบังคับการอารักขาและควบคุมฝูงชน</h2>
    <p id="mission-date">ประจำวันที่ ... รอโหลดข้อมูล ...</p>
  </div>

  <div class="content-area">
    <table class="mission-table">
      <thead>
        <tr>
          <th class="col-name">ผู้บังคับบัญชา</th>
          <th class="col-time">เวลา</th>
          <th class="col-task">ภารกิจ</th>
          <th class="col-place">สถานที่</th>
        </tr>
      </thead>
      <tbody id="table-body">
        </tbody>
    </table>
  </div>

  <div class="footer-area">
    <div class="signature-block">
        (...................................................)<br>
        ตำแหน่ง..........................................
    </div>
    <div class="footer-note" id="footer-update">ข้อมูล ณ วันที่ ...</div>
  </div>
</div>

<script>
  // คัดลอก URL จากการ Deployment ใน Google Apps Script มาวางที่นี่
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbw74o7v2c41P16Et7MjZykAUGyqkA9JEe-JRVw7GYnH9xW6Cy3ot9T1mMou2HwBbpVvAQ/exec";

  async function fetchData() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 50px;">กำลังดึงข้อมูลจาก Google Sheets...</td></tr>';

    try {
      const response = await fetch(SHEET_API_URL);
      const data = await response.json();
      
      tbody.innerHTML = ''; 

      // วนลูปสร้างแถวข้อมูล
      data.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="name-cell">${item.name.replace(/\n/g, '<br>')}</td>
          <td class="col-time">${item.time.replace(/\n/g, '<br>')}</td>
          <td>${formatTask(item.task)}</td>
          <td>${item.place.replace(/\n/g, '<br>')}</td>
        `;
        tbody.appendChild(row);
      });

      // เติมแถวว่างด้านล่างเพื่อให้ดูเต็มแผ่น
      const emptyRows = 5 - data.length;
      if (emptyRows > 0) {
        const spacer = document.createElement('tr');
        spacer.style.height = (emptyRows * 100) + "px";
        spacer.innerHTML = '<td></td><td></td><td></td><td></td>';
        tbody.appendChild(spacer);
      }

      // อัปเดตวันที่ในหัวข้อและท้ายกระดาษ (อิงตามข้อมูลแถวแรก หรือ วันปัจจุบัน)
      const now = new Date();
      const thaiDate = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('footer-update').innerText = "ข้อมูล ณ วันที่ " + thaiDate;
      // หมายเหตุ: วันที่ประจำภารกิจแนะนำให้แก้ใน HTML หรือดึงจาก Sheet คอลัมน์พิเศษ

    } catch (error) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">เกิดข้อผิดพลาด: ไม่สามารถเชื่อมต่อ API ได้</td></tr>';
      console.error(error);
    }
  }

  function formatTask(task) {
    // ถ้ามีคำว่า "เวร" ให้เป็นสีแดง
    if (task.includes("เวร")) {
      return `<span class="red-task">${task.replace(/\n/g, '<br>')}</span>`;
    }
    return task.replace(/\n/g, '<br>');
  }

  async function downloadImage() {
    const element = document.getElementById('capture-area');
    const canvas = await html2canvas(element, {
      scale: 3, // ความชัดสูงสุด
      useCORS: true,
      width: 1651,
      height: 991
    });
    
    const link = document.createElement('a');
    link.download = `ตารางภารกิจ_บก_อก_ฝ.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // เรียกใช้ทันทีที่เปิดหน้า
  window.onload = fetchData;
</script>

</body>
</html>
