<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ภารกิจผู้บังคับบัญชา</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @font-face {
      font-family: 'THSarabunIT9';
      src: local('TH SarabunIT๙'), local('TH Sarabun New');
    }

    :root {
      --border: #111111;
      --danger: #B40000;
      --page-bg: #F3F5F7;
      --card-bg: #FFFFFF;
      --btn: #1F6FEB;
      --btn2: #4B5563;
      --body-bg: #F7F7F7;
      --text: #111111;
      --ok: #0f5132;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      background: var(--page-bg);
      color: var(--text);
      font-family: 'THSarabunIT9', 'TH SarabunIT๙', 'TH Sarabun New', Tahoma, sans-serif;
    }

    .toolbar {
      max-width: 1400px;
      margin: 0 auto 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
    }

    .toolbar .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      background: var(--btn);
      font-size: 18px;
      cursor: pointer;
      font-family: inherit;
    }

    button.secondary {
      background: var(--btn2);
    }

    .hint {
      max-width: 1400px;
      margin: 0 auto 16px;
      font-size: 18px;
      color: #444;
    }

    .status {
      max-width: 1400px;
      margin: 0 auto 12px;
      font-size: 18px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .page-wrap {
      max-width: 1400px;
      margin: 0 auto 24px;
      background: var(--card-bg);
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
    }

    .page-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .sheet-page {
      background: #fff;
      border: 1px solid #d0d7de;
      overflow: hidden;
    }

    .title-box {
      text-align: center;
      font-weight: 700;
      font-size: 28px;
      line-height: 1.25;
      white-space: pre-line;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
    }

    table.mission {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    table.mission th,
    table.mission td {
      border: 1px solid var(--border);
      text-align: center;
      vertical-align: middle;
      padding: 8px 10px;
      white-space: pre-line;
      line-height: 1.25;
      font-size: 22px;
      background: var(--body-bg);
    }

    table.mission th {
      font-size: 24px;
      font-weight: 700;
    }

    .name-cell {
      font-weight: 700;
    }

    .red-text {
      color: var(--danger);
      font-weight: 700;
    }

    .footer-note {
      padding: 10px 6px 0;
      text-align: right;
      color: var(--danger);
      font-size: 22px;
      font-weight: 700;
      background: #fff;
    }

    .signature {
      text-align: center;
      white-space: pre-line;
      padding: 18px 10px 8px;
      font-size: 22px;
      background: #fff;
    }

    .loading {
      max-width: 1400px;
      margin: 0 auto;
      text-align: center;
      font-size: 24px;
      padding: 48px 12px;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 900px) {
      body { padding: 10px; }
      .title-box { font-size: 22px; }
      table.mission th, table.mission td { font-size: 16px; padding: 6px; }
      table.mission th { font-size: 18px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>ภารกิจผู้บังคับบัญชา</h1>
    <div class="actions">
      <button class="secondary" onclick="reloadData()">รีเฟรชข้อมูล</button>
      <button onclick="captureAll()">แคปรูปทั้งหมด</button>
    </div>
  </div>

  <div class="hint">
    หน้าเว็บนี้ดึงข้อมูลจาก Google Apps Script และแสดงผลจาก Google Sheet โดยตรง
  </div>

  <div id="statusBox" class="status"></div>

  <div id="app">
    <div class="loading">กำลังโหลดข้อมูล...</div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxJTcaq3_rXJlGBs8DRPv8y7l7JuMigUJdC5cggTXKo70QiqPLSsySXV5BC3LMUsAgeYg/exec';

    let appData = null;

    function showStatus(message, isError = false) {
      const box = document.getElementById('statusBox');
      box.textContent = message;
      box.className = 'status show ' + (isError ? 'error' : 'ok');
    }

    function fetchPagesJSONP() {
      return new Promise((resolve, reject) => {
        const callbackName = 'missionCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const script = document.createElement('script');
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('โหลดข้อมูลหมดเวลา'));
        }, 15000);

        function cleanup() {
          clearTimeout(timeout);
          if (script.parentNode) script.parentNode.removeChild(script);
          try {
            delete window[callbackName];
          } catch (e) {
            window[callbackName] = undefined;
          }
        }

        window[callbackName] = function(data) {
          cleanup();

          if (!data || !data.ok) {
            reject(new Error((data && data.message) || 'โหลดข้อมูลไม่สำเร็จ'));
            return;
          }

          resolve(data.pages || []);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error('เชื่อมต่อ GAS ไม่สำเร็จ'));
        };

        script.src =
          GAS_URL +
          (GAS_URL.includes('?') ? '&' : '?') +
          'action=pages' +
          '&callback=' + encodeURIComponent(callbackName) +
          '&_t=' + Date.now();

        document.body.appendChild(script);
      });
    }

    async function loadData() {
      const pages = await fetchPagesJSONP();
      appData = { pages };
      renderPages(pages);
      showStatus('โหลดข้อมูลจาก Google Sheet สำเร็จ');
    }

    function renderPages(pages) {
      const app = document.getElementById('app');
      app.innerHTML = '';

      pages.forEach((page, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'page-wrap';

        wrap.innerHTML = `
          <div class="page-actions">
            <button onclick="capturePage(${idx})">แคปรูปหน้านี้</button>
            <button class="secondary" onclick="sharePage(${idx})">ส่งต่อหน้านี้</button>
          </div>

          <div class="sheet-page" id="page-${idx}">
            <div class="title-box" style="background:${page.titleColor}">
              ${escapeHtml(page.title)}<br>${escapeHtml(page.subtitle || '')}
            </div>

            <table class="mission">
              <colgroup>
                <col style="width: 22%">
                <col style="width: 18%">
                <col style="width: 35%">
                <col style="width: 25%">
              </colgroup>
              <thead>
                <tr>
                  <th style="background:${page.headerColor}">ผู้บังคับบัญชา</th>
                  <th style="background:${page.headerColor}">เวลา</th>
                  <th style="background:${page.headerColor}">ภารกิจ</th>
                  <th style="background:${page.headerColor}">สถานที่</th>
                </tr>
              </thead>
              <tbody>
                ${page.rows.map(renderGroup).join('')}
              </tbody>
            </table>

            ${page.signature ? '<div class="signature">' + escapeHtml(page.signature) + '</div>' : ''}
            ${page.footerNote ? '<div class="footer-note">' + escapeHtml(page.footerNote) + '</div>' : ''}
          </div>
        `;

        app.appendChild(wrap);
      });
    }

    function renderGroup(group) {
      const span = group.entries.length || 1;

      return group.entries.map((entry, idx) => `
        <tr>
          ${idx === 0 ? '<td class="name-cell" rowspan="' + span + '">' + escapeHtml(group.name) + '</td>' : ''}
          <td>${escapeHtml(entry.time || '')}</td>
          <td class="${entry.red ? 'red-text' : ''}">${escapeHtml(entry.mission || '')}</td>
          <td>${escapeHtml(entry.location || '')}</td>
        </tr>
      `).join('');
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/\n/g, '<br>');
    }

    async function captureElement(el, filename) {
      const canvas = await html2canvas(el, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff'
      });

      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();

      return canvas;
    }

    async function capturePage(index) {
      const page = document.getElementById('page-' + index);
      await captureElement(page, 'mission-page-' + (index + 1) + '.png');
    }

    async function captureAll() {
      const total = (appData && appData.pages ? appData.pages.length : 0);
      for (let i = 0; i < total; i++) {
        await capturePage(i);
      }
    }

    async function sharePage(index) {
      const page = document.getElementById('page-' + index);
      const canvas = await html2canvas(page, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff'
      });

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      const file = new File([blob], 'mission-page-' + (index + 1) + '.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: 'ภารกิจหน้า ' + (index + 1)
        });
      } else {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name;
        a.click();
        alert('อุปกรณ์นี้ยังไม่รองรับการส่งต่อโดยตรง ระบบจึงดาวน์โหลดรูปให้แทน');
      }
    }

    function reloadData() {
      document.getElementById('app').innerHTML = '<div class="loading">กำลังโหลดข้อมูล...</div>';
      showStatus('กำลังรีเฟรชข้อมูล...');
      loadData();
    }

    loadData().catch(err => {
      document.getElementById('app').innerHTML =
        '<div class="loading error">โหลดข้อมูลไม่สำเร็จ: ' + (err.message || err) + '</div>';
      showStatus('โหลดข้อมูลไม่สำเร็จ: ' + (err.message || err), true);
    });
  </script>
</body>
</html>
